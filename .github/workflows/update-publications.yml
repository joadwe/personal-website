name: Update Publications from Google Scholar

on:
  schedule:
    # Run weekly on Mondays at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install scholarly free-proxy

      - name: Fetch & update publications
        env:
          SCHOLAR_ID: DzpMNxoAAAAJ
        run: python scripts/update_publications.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet docs/publications.md && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit & push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/publications.md
          git commit -m "chore: auto-update publications from Google Scholar"
          git push
